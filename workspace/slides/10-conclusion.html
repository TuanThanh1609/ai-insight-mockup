<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1A2138; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.badge {
  display: inline-block;
  background: rgba(191,48,3,0.2);
  color: #BF3003;
  border: 1pt solid #BF3003;
  font-size: 9pt;
  font-weight: bold;
  padding: 4pt 12pt;
  letter-spacing: 2pt;
  text-transform: uppercase;
  margin-bottom: 16pt;
}
h1 {
  color: #ffffff;
  font-size: 30pt;
  font-weight: bold;
  margin: 0 0 10pt 0;
  text-align: center;
}
.sub {
  color: #8BA3CC;
  font-size: 12pt;
  margin: 0 0 24pt 0;
  text-align: center;
}
.divider {
  width: 50pt;
  height: 3pt;
  background: #BF3003;
  margin-bottom: 20pt;
}
.metrics-row {
  display: flex;
  gap: 28pt;
  margin-bottom: 20pt;
}
.metric {
  text-align: center;
}
.metric-val { color: #BF3003; font-size: 22pt; font-weight: bold; margin: 0; }
.metric-label { color: #8BA3CC; font-size: 9pt; margin: 0; letter-spacing: 1pt; }
.note {
  color: #6B7FA3;
  font-size: 8pt;
  margin: 0;
  text-align: center;
  letter-spacing: 1pt;
}
.bottom-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 6pt;
  background: #BF3003;
}
</style>
</head>
<body>
  <p class="badge">PRD Approved · Ready for Implementation</p>
  <h1>Kết Luận</h1>
  <p class="sub">Ads Medical Checkup — Core Loop Gamification cho mọi doanh nghiệp</p>
  <div class="divider"></div>
  <div class="metrics-row">
    <div class="metric">
      <p class="metric-val">8</p>
      <p class="metric-label">NHÓM BỆNH</p>
    </div>
    <div class="metric">
      <p class="metric-val">4</p>
      <p class="metric-label">WIZARD STEPS</p>
    </div>
    <div class="metric">
      <p class="metric-val">5.8/10</p>
      <p class="metric-label">HEALTH SCORE</p>
    </div>
    <div class="metric">
      <p class="metric-val">39.3M</p>
      <p class="metric-label">CHI PHÍ ẢO</p>
    </div>
  </div>
  <p class="note">Smax AI · Editorial Precision Design · React 19 + Vite + Tailwind v4</p>
  <div class="bottom-bar"></div>
</body>
</html>
