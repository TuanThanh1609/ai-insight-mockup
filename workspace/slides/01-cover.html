<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1A2138;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column; position: relative;
}
.accent-top { height: 5pt; background: #BF3003; }
.content { padding: 36pt 50pt 0 50pt; flex: 1; display: flex; flex-direction: column; }
.eyebrow { color: #BF3003; font-size: 9pt; font-weight: bold; letter-spacing: 3pt; text-transform: uppercase; margin-bottom: 12pt; }
h1 { color: #ffffff; font-size: 32pt; font-weight: bold; margin: 0 0 10pt 0; line-height: 1.1; }
.sub { color: #8BA3CC; font-size: 11pt; margin: 0 0 14pt 0; line-height: 1.5; }
.divider { width: 50pt; height: 3pt; background: #BF3003; margin-bottom: 10pt; }
.meta { color: #4A5E80; font-size: 8pt; letter-spacing: 1pt; text-transform: uppercase; margin: 0; }
.right-box {
  position: absolute; right: 50pt; top: 40pt; bottom: 50pt;
  width: 160pt; background: #0D1526; border-radius: 8pt;
  display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20pt;
}
.score-num { color: #BF3003; font-size: 54pt; font-weight: bold; margin: 0; line-height: 1; }
.score-lbl { color: #8BA3CC; font-size: 8pt; letter-spacing: 2pt; text-transform: uppercase; margin-top: 4pt; }
.score-sub { color: #4A5E80; font-size: 7pt; margin-top: 4pt; }
.bottom-strip { background: #0D1526; padding: 10pt 50pt; display: flex; gap: 14pt; align-items: center; }
.strip-item { display: flex; align-items: center; gap: 5pt; }
.strip-dot { width: 6pt; height: 6pt; border-radius: 50%; }
.dot-rust { background: #BF3003; }
.dot-blue { background: #0052FF; }
.dot-green { background: #059669; }
.strip-text { color: #4A5E80; font-size: 8pt; }
</style>
</head>
<body>
<div class="accent-top"></div>
<div class="content">
  <p class="eyebrow">Smax AI Diagnostics Module</p>
  <h1>Khám Bệnh<br>Hội Thoại</h1>
  <p class="sub">AI phân tích hội thoại đa kênh → Chẩn đoán 9 nhóm vấn đề → Gợi ý hành động khắc phục từ Chuyên gia Smax</p>
  <div class="divider"></div>
  <p class="meta">PRD v1.1 &nbsp;·&nbsp; 2026-03-27 &nbsp;·&nbsp; Design: Editorial Precision</p>
</div>
<div class="right-box">
  <p class="score-num">6.4</p>
  <p class="score-lbl">Điểm Sức Khỏe</p>
  <p class="score-sub">Hồ sơ bệnh án mẫu</p>
</div>
<div class="bottom-strip">
  <div class="strip-item"><div class="strip-dot dot-rust"></div><p class="strip-text">9 nhóm bệnh</p></div>
  <div class="strip-item"><div class="strip-dot dot-blue"></div><p class="strip-text">Gamification loop</p></div>
  <div class="strip-item"><div class="strip-dot dot-green"></div><p class="strip-text">Smax AI</p></div>
</div>
</body>
</html>
